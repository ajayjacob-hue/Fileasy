<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient matching the app's secondary accent -->
    <linearGradient id="glass-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
    
    <!-- Shiny Reflection -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Text Gradient from the screenshot -->
    <linearGradient id="text-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/> <!-- Vibrant Indigo-ish -->
      <stop offset="1" stop-color="#6366f1"/> <!-- Electric Blue -->
    </linearGradient>

    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Glassy Card -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#glass-bg)" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
  
  <!-- Reflection Layer -->
  <path d="M10 50C10 27.9086 27.9086 10 50 10H150C172.091 10 190 27.9086 190 50V90L10 120V50Z" fill="url(#shine)"/>
  
  <!-- Central 'F' with the vibrant gradient and glow -->
  <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" fill="url(#text-grad)" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" filter="url(#glow)">F</text>
  
  <!-- Subtle Glass Border Highlight -->
  <rect x="10.75" y="10.75" width="178.5" height="178.5" rx="39.25" stroke="white" stroke-opacity="0.05" stroke-width="0.5"/>
</svg>
