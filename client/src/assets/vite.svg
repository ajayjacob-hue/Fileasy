<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Solid Dark Glass Base -->
    <linearGradient id="glass-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    
    <!-- Ultra-Pop Gradient for the F -->
    <linearGradient id="text-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7"/> <!-- Brighter Purple -->
      <stop offset="1" stop-color="#3b82f6"/> <!-- Brighter Blue -->
    </linearGradient>

    <!-- Intense Glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur" result="brighter-blur">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brighter-blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Card with sharp edges -->
  <rect x="10" y="10" width="180" height="180" fill="url(#glass-bg)" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Perfectly Centered F -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" fill="url(#text-grad)" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="125" filter="url(#glow)">F</text>
  
  <!-- Edge Highlight with sharp edges -->
  <rect x="11" y="11" width="178" height="178" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
</svg>
